        var start = (trang-1)*kichThuoc;
        hienTai.slice(start, start+kichThuoc).forEach(function(item) {
            var tr = document.createElement('tr');
            tr.innerHTML = '<td>'+item.stt+'</td><td>'+item.ten+'</td><td id="p-'+item.ma+'">'+(item.phong || '...')+'</td><td><button onclick="xem(\''+item.ma+'\', \''+item.ten+'\')">XEM</button></td>';
            body.appendChild(tr);
            if(!item.phong) layPhong(item.ma);
        });
        document.getElementById('soTrang').innerText = ' Trang ' + trang;
    }

    function locMon() {
        var key = document.getElementById('oTim').value.toUpperCase();
        hienTai = list.filter(function(i) { return i.ten.toUpperCase().indexOf(key) > -1; });
        trang = 1; veBang();
    }

    function layPhong(ma) {
        fetch('https://dut-backend-api.onrender.com/api/extract?ca='+ma)
        .then(function(res) { return res.json() })
        .then(function(res) {
            if(res.success) {
                var item = list.find(function(i) { return i.ma == ma });
                item.phong = res.phong;
                var el = document.getElementById('p-'+ma);
                if(el) el.innerText = res.phong;
            }
        });
    }

    function xem(ma, ten) {
        document.getElementById('trangChu').className = 'tab';
        document.getElementById('trangXem').className = 'tab hien';
        document.getElementById('nutBack').style.display = 'block';
        document.getElementById('tieude').innerText = ten;
        document.getElementById('msg').innerText = 'Dang load...';
        document.getElementById('bangSv').style.display = 'none';

        fetch('https://dut-backend-api.onrender.com/api/extract?ca='+ma)
        .then(function(res) { return res.json() })
        .then(function(res) {
            if(res.success) {
                document.getElementById('msg').innerText = 'Phong: ' + res.phong;
                var body = document.getElementById('dsSv');
                body.innerHTML = '';
                res.data.forEach(function(sv) {
                    body.innerHTML += '<tr><td>'+sv.stt+'</td><td>'+sv.masv+'</td><td>'+sv.hoten+'</td><td>'+sv.ngaysinh+'</td><td>'+sv.lopsh+'</td></tr>';
                });
                document.getElementById('bangSv').style.display = 'table';
            }
        });
    }

    function veTrangChu() {
        document.getElementById('trangChu').className = 'tab hien';
        document.getElementById('trangXem').className = 'tab';
        document.getElementById('nutBack').style.display = 'none';
        document.getElementById('tieude').innerText = 'VNY | DSSV PHÒNG THI';
    }

    function trangTruoc() { if(trang>1) {trang--; veBang();} }
    function trangSau() { if(trang*kichThuoc < hienTai.length) {trang++; veBang();} }
</script>
</body>
</html>
